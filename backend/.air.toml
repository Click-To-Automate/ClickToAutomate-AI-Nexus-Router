root = "."
tmp_dir = "tmp"

[build]
  # Just build the executable
  cmd = "go build -o ./tmp/main.exe ."
  # Run the compiled executable
  bin = "./tmp/main.exe"
  # Watch these extensions for changes
  include_ext = ["go", "tpl", "tmpl", "html", "json"]
  # Ignore these directories and files
  exclude_dir = ["assets", "tmp", "vendor", "public"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  # Delay after change before rebuilding (ms)
  delay = 1000
  stop_on_error = true
  send_interrupt = false
  kill_delay = "500ms"
  log = "air.log"

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = true
  main_only = false

[misc]
  clean_on_exit = true
